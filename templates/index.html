<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM System - Welcome</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        color: #333;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .hero-section {
        background: white;
        border-radius: 12px;
        padding: 50px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 600px;
        margin: 0 auto;
      }
      .hero-title {
        color: #667eea;
        font-weight: bold;
        font-size: 2.5rem;
        margin-bottom: 20px;
      }
      .hero-subtitle {
        color: #666;
        font-size: 1.2rem;
        margin-bottom: 40px;
      }
      .feature-list {
        text-align: left;
        margin: 40px 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .feature-item {
        padding: 10px;
        font-size: 1rem;
        background: #f5f7fa;
        border-radius: 8px;
        padding: 15px;
      }
      .feature-item i {
        color: #667eea;
        margin-right: 8px;
        font-weight: bold;
      }
      .btn-custom {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        padding: 12px 30px;
        font-size: 1.1rem;
        border-radius: 8px;
        margin: 10px 5px;
        color: white;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
      }
      .btn-custom:hover {
        background: linear-gradient(135deg, #5568d3 0%, #653a8a 100%);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        text-decoration: none;
      }
      .demo-note {
        background: #e7f3ff;
        border-left: 4px solid #667eea;
        padding: 15px;
        border-radius: 4px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero-section">
        <h1 class="hero-title">🏢 HRM System</h1>
        <p class="hero-subtitle">Hệ Thống Quản Lý Nhân Sự Toàn Diện</p>

    

        <div>
          <a href="/accounts/login/" class="btn-custom">
            <i class="fas fa-sign-in-alt"></i> Đăng Nhập
          </a>
        </div>

        <div class="demo-note">
          <p class="mb-0">Sử dụng admin account để đăng nhập</p>
          <small class="text-muted"
            >Hoặc tạo account mới tại Admin Panel (/admin/)</small
          >
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
