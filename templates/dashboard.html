{% extends 'base.html' %} {% block title %} Dashboard {% endblock %} {% block content %}
<div class="container-fluid">
  <div class="page-header">
    <h1>Dashboard</h1>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item active">Dashboard</li>
      </ol>
    </nav>
  </div>

  <div class="row">
    <div class="col-md-3">
      <div class="stat-card">
        <h3>{{ total_employees }}</h3>
        <p><i class="fas fa-users"></i> Total Employees</p>
      </div>
    </div>
    <div class="col-md-3">
      <div class="stat-card">
        <h3>{{ active_employees }}</h3>
        <p><i class="fas fa-check-circle"></i> Active</p>
      </div>
    </div>
    <div class="col-md-6">
      <div class="stat-card">
        <h3>{{ total_departments }}</h3>
        <p><i class="fas fa-sitemap"></i> Departments</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
