<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}HRM System{% endblock %} — HRM</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Main CSS -->
    <link rel="stylesheet" href="/static/css/main.css" />

    <style>
      /* ===== AUTH PAGE SPECIFIC ===== */
      body {
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 50%,
          #0f172a 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* hide main.css scrollbar override on auth pages */
      body::before {
        content: none;
      }

      .form-control:focus {
        /* placeholder for scroll */
        z-index: 0;
      }

      /* ===== AUTH CONTAINER ===== */
      .auth-container {
        width: 100%;
        max-width: 440px;
        z-index: 1;
      }

      /* Logo area */
      .auth-logo {
        text-align: center;
        margin-bottom: 28px;
      }
      .auth-logo .logo-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.6rem;
        margin-bottom: 12px;
        box-shadow: 0 8px 30px rgba(79, 70, 229, 0.5);
      }
      .auth-logo h1 {
        color: #fff;
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0 0 4px;
        letter-spacing: -0.3px;
      }
      .auth-logo p {
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.82rem;
        margin: 0;
      }

      /* Auth card */
      .auth-card {
        background: rgba(255, 255, 255, 0.97);
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .auth-card-body {
        padding: 32px 36px;
      }

      .auth-card h3 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--gray-900);
        margin-bottom: 6px;
      }
      .auth-card p.subtitle {
        color: var(--gray-500);
        font-size: 0.845rem;
        margin-bottom: 24px;
      }

      /* Floating BG circles */
      .bg-circle {
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.12;
        pointer-events: none;
        z-index: 0;
      }
      .bg-circle-1 {
        width: 400px;
        height: 400px;
        background: var(--primary);
        top: -100px;
        left: -100px;
      }
      .bg-circle-2 {
        width: 300px;
        height: 300px;
        background: var(--secondary);
        bottom: -50px;
        right: -50px;
      }
      .bg-circle-3 {
        width: 200px;
        height: 200px;
        background: var(--accent);
        top: 50%;
        right: 20%;
      }

      .auth-footer-text {
        text-align: center;
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.78rem;
      }
    </style>

    {% block extra_css %}{% endblock %}
  </head>

  <body>
    <!-- Decorative circles -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-briefcase"></i></div>
      <h1>HRM System</h1>
      <p>Human Resource Management Platform</p>
    </div>

    <!-- Auth card container -->
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-card-body">{% block content %}{% endblock %}</div>
      </div>
      <p class="auth-footer-text">
        &copy; 2024 HRM System. All rights reserved.
      </p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
