{% extends 'base.html' %}

{% block title %}
Daily Attendance
{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="page-header">
    <h1><i class="fas fa-calendar"></i> Daily Attendance</h1>
  </div>

  <div class="card mb-4">
    <div class="card-header">
      <h5 class="mb-0">Date: {{ date }}</h5>
    </div>

    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="date" value="{{ date }}" />

        <div class="table-responsive">
          <table class="table">
            <thead class="table-light">
              <tr>
                <th>Employee</th>
                <th>Check In</th>
                <th>Check Out</th>
                <th>Status</th>
                <th>Notes</th>
              </tr>
            </thead>

            <tbody>
              {% for attendance in attendances %}
              <tr>
                <td>{{ attendance.employee.full_name }}</td>

                <td>
                  <input
                    type="time"
                    name="check_in_{{ attendance.employee.id }}"
                    value="{{ attendance.check_in_time }}"
                    class="form-control form-control-sm"
                  />
                </td>

                <td>
                  <input
                    type="time"
                    name="check_out_{{ attendance.employee.id }}"
                    value="{{ attendance.check_out_time }}"
                    class="form-control form-control-sm"
                  />
                </td>

                <td>
                  <select
                    name="status_{{ attendance.employee.id }}"
                    class="form-select form-select-sm"
                  >
                    {% for val, label in statuses %}
                      <option value="{{ val }}"
                        {% if attendance.status == val %}selected{% endif %}
                      >
                        {{ label }}
                      </option>
                    {% endfor %}
                  </select>
                </td>

                <td>
                  <input
                    type="text"
                    name="notes_{{ attendance.employee.id }}"
                    value="{{ attendance.notes }}"
                    class="form-control form-control-sm"
                  />
                </td>
              </tr>
              {% endfor %}
            </tbody>

          </table>
        </div>

        <div class="d-grid gap-2 mt-3">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Attendance
          </button>

          <a href="{% url 'attendance:attendance_list' %}" class="btn btn-secondary">
            <i class="fas fa-times"></i> Cancel
          </a>
        </div>

      </form>
    </div>
  </div>
</div>

{% endblock %}
