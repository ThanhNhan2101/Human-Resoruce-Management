{% extends 'base.html' %} {% block title %}Delete Confirmation{% endblock %} {% block content %}
<div class="container-fluid">
  <div class="row justify-content-center mt-5">
    <div class="col-md-6">
      <div class="card border-danger">
        <div class="card-header bg-danger text-white">
          <h5 class="mb-0">
            <i class="fas fa-exclamation-triangle"></i> Delete Confirmation
          </h5>
        </div>
        <div class="card-body">
          <p class="mb-3">Are you sure you want to delete this employee:</p>
          <div class="alert alert-warning">
            <strong>{{ employee.full_name }}</strong> ({{ employee.employee_id
            }})
          </div>
          <p class="text-muted small">This action cannot be undone!</p>

          <form method="post" class="d-grid gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
              <i class="fas fa-trash"></i> Delete
            </button>
            <a
              href="{% url 'employees:employee_list' %}"
              class="btn btn-secondary"
            >
              <i class="fas fa-times"></i> Cancel
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
