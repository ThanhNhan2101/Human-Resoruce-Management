[pytest]
DJANGO_SETTINGS_MODULE = config.settings.base
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

testpaths = tests

markers =
    django_db: mark test as needing database access
    slow: mark test as slow running
    integration: mark test as an integration test
    unit: mark test as a unit test

# Coverage settings
[coverage:run]
source = core
omit = 
    */migrations/*
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
